name: Build and Deploy Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode google-services.json
      env:
        FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
      run: |
        echo "$FIREBASE_SECRET" | base64 --decode > app/google-services.json

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/vhs-release-key.jks

    - name: Grant execute permission for gradlew
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 9.5.1
        fi
        chmod +x gradlew

    - name: Build and Sign Release APK via Gradle
      env:
        KEYSTORE_PATH: "vhs-release-key.jks"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
      run: ./gradlew assembleRelease --no-daemon

    - name: Rename APK for Release
      run: |
        cp app/build/outputs/apk/release/app-release.apk app-release.apk

    - name: Delete Old GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete release --yes --cleanup-tag || true

    - name: Publish Fresh Clean Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: release
        name: "Latest release"
        draft: false
        prerelease: false
        files: app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
